# .github/workflows/update-climate-data.yml
name: Update climate data

on:
  workflow_dispatch:
  schedule:
    # Run weekly on the 10th, 17th, and 24th-ish cadence via Fridays.
    # UTC time. Pick a non-zero minute to avoid peak queue times.
    - cron: "23 7 * * 5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download latest source files
        run: |
          curl --fail --location --silent --show-error \
            "https://data.giss.nasa.gov/gistemp/tabledata_v4/GLB.Ts+dSST.txt" \
            --output data/GLB.Ts+dSST.txt

          curl --fail --location --silent --show-error \
            "https://gml.noaa.gov/webdata/ccgg/trends/co2/co2_mm_mlo.txt" \
            --output data/co2_mm_mlo.txt

      - name: Commit changed data files
        run: |
          if git diff --quiet -- data/GLB.Ts+dSST.txt data/co2_mm_mlo.txt; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/GLB.Ts+dSST.txt data/co2_mm_mlo.txt
          git commit -m "Update climate data"
          git push
